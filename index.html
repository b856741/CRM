<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubSpot CRM 表單介接成果展示</title>
    <style>
        /* 極簡質感風 CSS */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .demo-title {
            text-align: center;
            color: #1d1d1f;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 28px;
        }
        .demo-subtitle {
            text-align: center;
            color: #86868b;
            margin-bottom: 24px;
            font-size: 16px;
        }
        /* 頁籤切換器樣式 */
        .tab-menu {
            display: flex;
            background-color: #e3e3e8;
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        /* 表單容器 */
        .form-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
            min-height: 400px;
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        h2 {
            text-align: center;
            color: #1d1d1f;
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #86868b;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #f5f5f7;
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        .form-group select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2386868b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #0071e3;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .submit-btn:hover {
            background-color: #0077ed;
        }
        .submit-btn:disabled {
            background-color: #a1a1a6;
            cursor: not-allowed;
        }
        .status-msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .status-success {
            background-color: #e2f0d9;
            color: #385723;
            border: 1px solid #c5e1b2;
        }
        .status-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .form-group input.is-invalid,
        .form-group textarea.is-invalid,
        .form-group select.is-invalid {
            border-color: #dc3545;
            background-color: #fff8f8;
            box-shadow: 0 0 0 4px rgba(220, 53, 69, 0.12);
        }
    
        .field-error {
            display: none;
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
        }
        .field-error.visible {
            display: block;
        }

        /* ── RWD：行動裝置適配 ────────────────────────────────── */
        @media (max-width: 480px) {
            .form-container {
                padding: 28px 20px;
                border-radius: 12px;
                margin: 0;
                width: 100%;
            }
            .tab-menu {
                width: 100%;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .form-group input,
            .form-group textarea {
                font-size: 16px;
            }
            .submit-btn:active {
                background-color: #005bbf;
            }
        }

        /* ── 階段四：追蹤參數偵錯面板 ── */
        .debug-panel {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }
        .debug-panel-title {
            color: #e94560;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .debug-panel-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e94560;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }
        .debug-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #0f3460;
        }
        .debug-row:last-child { border-bottom: none; }
        .debug-key {
            color: #a8d8ea;
            min-width: 130px;
            flex-shrink: 0;
        }
        .debug-val {
            color: #f5f5f5;
            word-break: break-all;
        }
        .debug-val.found    { color: #2ecc71; }
        .debug-val.missing  { color: #888; font-style: italic; }
    </style>
    <!-- 引入 HubSpot 官方 SDK (僅用於頁籤一，加 defer 避免阻擋網頁載入) -->
    <script charset="utf-8" type="text/javascript" src="https://js-na2.hsforms.net/forms/embed/v2.js" defer></script>
</head>
<body>

    <h1 class="demo-title">HubSpot 整合成果展示</h1>
    <p class="demo-subtitle">對比官方內嵌 SDK 與自主掌控 AJAX API 的開發成效</p>

    <!-- 頁籤選單 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('ajax-tab')">AJAX API (自訂自控版)</button>
        <button class="tab-btn" onclick="switchTab('sdk-tab')">SDK Embed (官方內嵌版)</button>
    </div>

    <!-- 主展示容器 -->
    <div class="form-container">
        
        <!-- 頁籤一：自訂 AJAX/Fetch 表單 -->
        <div id="ajax-tab" class="tab-content active">
            <h2>原生 AJAX 聯絡表單</h2>

            <!-- 階段四：即時追蹤參數偵錯面板 -->
            <div class="debug-panel" id="debug-panel">
                <div class="debug-panel-title">🔍 階段四 — 即時追蹤偵測</div>
                <div class="debug-row">
                    <span class="debug-key">utm_source</span>
                    <span class="debug-val" id="dbg-utm_source"></span>
                </div>
                <div class="debug-row">
                    <span class="debug-key">utm_medium</span>
                    <span class="debug-val" id="dbg-utm_medium"></span>
                </div>
                <div class="debug-row">
                    <span class="debug-key">utm_campaign</span>
                    <span class="debug-val" id="dbg-utm_campaign"></span>
                </div>
                <div class="debug-row">
                    <span class="debug-key">utm_term</span>
                    <span class="debug-val" id="dbg-utm_term"></span>
                </div>
                <div class="debug-row">
                    <span class="debug-key">utm_content</span>
                    <span class="debug-val" id="dbg-utm_content"></span>
                </div>
                <div class="debug-row">
                    <span class="debug-key">hubspotutk</span>
                    <span class="debug-val" id="dbg-hutk"></span>
                </div>
            </div>

            <form id="crm-contact-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstname">名字 (First Name)</label>
                        <input type="text" id="firstname" placeholder="小明">
                        <span class="field-error" id="error-firstname">名字不可只包含空白。</span>
                    </div>
                    <div class="form-group">
                        <label for="lastname">姓氏 (Last Name)</label>
                        <input type="text" id="lastname" placeholder="王">
                        <span class="field-error" id="error-lastname">姓氏不可只包含空白。</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">電子郵件 *</label>
                    <input type="text" id="email" required placeholder="example@mail.com">
                    <span class="field-error" id="error-email">請輸入有效的電子郵件格式。</span>
                </div>

                <div class="form-group">
                    <label for="phone">電話號碼 (Phone Number)</label>
                    <input type="tel" id="phone" placeholder="0912345678">
                    <span class="field-error" id="error-phone">電話號碼需為 09 開頭的 10 位數字。</span>
                </div>

                <div class="form-group">
                    <label for="inquiry_type">詢問類型 *</label>
                    <select id="inquiry_type">
                        <option value="">請選擇您的需求...</option>
                        <option value="product_inquiry">產品諮詢 (Product Inquiry)</option>
                        <option value="partnership">商務合作 (Partnership)</option>
                        <option value="tech_support">技術支援 (Technical Support)</option>
                    </select>
                    <span class="field-error" id="error-inquiry_type">請選擇一個詢問類型。</span>
                </div>

                <div class="form-group">
                    <label for="message">您的訊息</label>
                    <textarea id="message" rows="4" placeholder="請輸入您想對我們說的話..."></textarea>
                </div>

                <button type="submit" id="submit-button" class="submit-btn">送出訊息</button>
            </form>

            <div id="success-message" class="status-msg status-success">
                感謝您的提交！我們已收到您的聯絡資訊。
            </div>
            <div id="error-message" class="status-msg status-error">
                提交失敗，請稍後再試。
            </div>
        </div>

        <!-- 頁籤二：官方 SDK iframe 內嵌表單 -->
        <div id="sdk-tab" class="tab-content">
            <h2>官方 SDK 內嵌表單</h2>
            <div id="hubspot-sdk-target">
                <p style="text-align:center; color:#86868b; font-size:14px; padding: 40px 0;">HubSpot 官方表單載入中...</p>
            </div>
        </div>

    </div>

    <script>
        // ── 頁籤切換邏輯 ──────────────────────────────────────────
        let sdkLoaded = false;

        // ── 階段四：偵錯面板初始化 ────────────────────────────────
        (function initDebugPanel() {
            const urlParams = new URLSearchParams(window.location.search);
            const utmKeys   = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];

            utmKeys.forEach(function(key) {
                const el  = document.getElementById('dbg-' + key);
                const val = urlParams.get(key);
                if (val) {
                    el.textContent = val;
                    el.className   = 'debug-val found';
                } else {
                    el.textContent = '（未偵測到）';
                    el.className   = 'debug-val missing';
                }
            });

            const hutkEl  = document.getElementById('dbg-hutk');
            const hutkVal = getCookie('hubspotutk');
            if (hutkVal) {
                hutkEl.textContent = hutkVal;
                hutkEl.className   = 'debug-val found';
            } else {
                hutkEl.textContent = '（Cookie 尚未寫入，需 HubSpot Tracking Code 運作後生成）';
                hutkEl.className   = 'debug-val missing';
            }
        })();

        function switchTab(tabId) {
            // 切換按鈕 active 樣式
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 切換內容區塊顯示
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');

            // 如果切換到官方 SDK 且尚未載入，則動態初始化
            if (tabId === 'sdk-tab' && !sdkLoaded) {
                initializeHubSpotSDK();
            }
        }

        function initializeHubSpotSDK() {
            // 安全防護：確認 SDK 的 JS 已經完全下載載入
            if (typeof hbspt !== 'undefined') {
                document.getElementById('hubspot-sdk-target').innerHTML = ''; // 清空載入中提示
                hbspt.forms.create({
                    region: "na2",
                    portalId: "246752949",
                    formId: "5be6d1ce-eb9f-4349-860f-5fbfb4b8423d",
                    target: "#hubspot-sdk-target"
                });
                sdkLoaded = true;
            } else {
                // 若 SDK 尚未載入完成，延遲 300ms 後重試
                setTimeout(initializeHubSpotSDK, 300);
            }
        }

        // ── 驗證輔助函式 ──────────────────────────────────────────
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function setError(inputId, errorId, show) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            if (show) {
                input.classList.add('is-invalid');
                error.classList.add('visible');
            } else {
                input.classList.remove('is-invalid');
                error.classList.remove('visible');
            }
        }

        function validateForm() {
            let isValid = true;

            const firstname    = document.getElementById('firstname').value.trim();
            const lastname     = document.getElementById('lastname').value.trim();
            const email        = document.getElementById('email').value.trim();
            const phone        = document.getElementById('phone').value.trim();
            const inquiryType  = document.getElementById('inquiry_type').value;

            // 名字：有填但全是空白
            const firstnameInvalid = document.getElementById('firstname').value.length > 0 && firstname === '';
            setError('firstname', 'error-firstname', firstnameInvalid);
            if (firstnameInvalid) isValid = false;

            // 姓氏：有填但全是空白
            const lastnameInvalid = document.getElementById('lastname').value.length > 0 && lastname === '';
            setError('lastname', 'error-lastname', lastnameInvalid);
            if (lastnameInvalid) isValid = false;

            // Email：必填 + 格式驗證
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const emailInvalid = email === '' || !emailRegex.test(email);
            setError('email', 'error-email', emailInvalid);
            if (emailInvalid) isValid = false;

            // 電話：非必填，但若有填需符合台灣格式（09 開頭共 10 碼）
            const phoneRegex = /^09\d{8}$/;
            const phoneInvalid = phone !== '' && !phoneRegex.test(phone);
            setError('phone', 'error-phone', phoneInvalid);
            if (phoneInvalid) isValid = false;

            // 詢問類型：必選
            const inquiryTypeInvalid = inquiryType === '';
            setError('inquiry_type', 'error-inquiry_type', inquiryTypeInvalid);
            if (inquiryTypeInvalid) isValid = false;

            return isValid;
        }

        // ── 即時驗證綁定 ──────────────────────────────────────────
        ['firstname', 'lastname', 'email', 'phone'].forEach(function(id) {
            document.getElementById(id).addEventListener('blur', validateForm);
        });
        document.getElementById('inquiry_type').addEventListener('change', validateForm);
        document.getElementById('inquiry_type').addEventListener('blur', validateForm);

        // ── 表單提交監聽器 ────────────────────────────────────────
        document.getElementById('crm-contact-form').addEventListener('submit', function(event) {
            event.preventDefault();

            if (!validateForm()) return;

            const submitBtn  = document.getElementById('submit-button');
            const successMsg = document.getElementById('success-message');
            const errorMsg   = document.getElementById('error-message');

            const firstNameValue   = document.getElementById('firstname').value;
            const lastNameValue    = document.getElementById('lastname').value;
            const emailValue       = document.getElementById('email').value;
            const phoneValue       = document.getElementById('phone').value;
            const inquiryTypeValue = document.getElementById('inquiry_type').value;
            const messageValue     = document.getElementById('message').value;

            submitBtn.disabled    = true;
            submitBtn.textContent = '傳送中...';
            successMsg.style.display = 'none';
            errorMsg.style.display   = 'none';

            const portalId = "246752949";
            const formId   = "5be6d1ce-eb9f-4349-860f-5fbfb4b8423d";
            const apiUrl   = `https://api.hsforms.com/submissions/v3/integration/submit/${portalId}/${formId}`;

            const fields = [
                { name: "firstname",    value: firstNameValue },
                { name: "lastname",     value: lastNameValue  },
                { name: "email",        value: emailValue     },
                { name: "phone",        value: phoneValue     },
                { name: "inquiry_type", value: inquiryTypeValue },
                { name: "message",      value: messageValue   }
            ];

            // 自動擷取網址中的 UTM 行銷追蹤參數
            const urlParams = new URLSearchParams(window.location.search);
            const utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
            
            utmParams.forEach(param => {
                const value = urlParams.get(param);
                if (value) {
                    fields.push({ name: param, value: value });
                }
            });

            // 讀取瀏覽器中的 hubspotutk 以綁定訪客足跡軌跡
            const hubspotUtk = getCookie('hubspotutk');

            const requestBody = {
                fields: fields,
                context: {
                    pageUri:  window.location.href,
                    pageName: document.title,
                    hutk:     hubspotUtk
                }
            };

            fetch(apiUrl, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(requestBody)
            })
            .then(response => {
                if (response.ok) {
                    console.log("資料、行銷參數與 UTK 訪客軌跡成功傳送至 HubSpot！");
                    document.getElementById('crm-contact-form').style.display = 'none';
                    successMsg.style.display = 'block';
                } else {
                    throw new Error("API 傳送錯誤，HTTP 狀態碼: " + response.status);
                }
            })
            .catch(error => {
                console.error("提交表單時發生錯誤：", error);
                errorMsg.style.display    = 'block';
                submitBtn.disabled        = false;
                submitBtn.textContent     = '送出訊息';
            });
        });
    </script>
</body>
</html>
